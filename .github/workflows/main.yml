name: Build Modded IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Azule
        run: |
          # سنكتفي بـ Azule فقط لأنها تحتوي على كل ما نحتاجه للحقن
          git clone https://github.com/Al4ise/Azule
          chmod +x ./Azule/azule
          sudo ln -s $(pwd)/Azule/azule /usr/local/bin/azule

      - name: Download IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v1.0 --pattern "*.ipa" --repo ${{ github.repository }}
          mv *.ipa WorldWarHeroes.ipa

      - name: Inject and Build
        run: |
          # تنفيذ الحقن مباشرة بدون الحاجة لـ Theos المعقد
          azule -i "WorldWarHeroes.ipa" -f "Tweak.xm" -o "WWH_MOD.ipa" || true
          
          if [ -f "WWH_MOD.ipa" ]; then
            echo "Success: IPA has been created."
          else
            echo "Error: Injection failed."
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Modded-IPA
          path: WWH_MOD.ipa
