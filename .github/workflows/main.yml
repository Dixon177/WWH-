name: Ahmed-Ghost-Mod-Encrypted
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Encrypted Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #include <vector>

          // دالة تشفير لحماية القيم من المسح (Obfuscation)
          #define XOR_KEY 0x5A
          void decrypt(char* data, size_t len) {
              for (size_t i = 0; i < len; i++) data[i] ^= XOR_KEY;
          }

          __attribute__((constructor)) static void init() {
              // تشفير البصمة البرمجية للهاك
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  // تفعيل الحماية بعد 5 ثوانٍ من دخول اللعبة لتخطي الفحص الأولي
                  NSLog(@"System Check: OK"); 
                  
                  // قيم مشفرة للهيدشوت والثبات والـ ESP
                  // النظام سيراها كبيانات عشوائية بفضل الـ XOR التشفيري
              });
          }
          EOF

          # ترجمة مع حماية إضافية وتجريد الملف من أي معلومات تدل على هويته (Strip Symbols)
          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -lc++ \
          -O3 -flto -mllvm -split-basic-blocks \
          Tweak.mm -o Tweak.dylib
          
          # مسح أي آثار برمجية داخل الملف
          strip -x Tweak.dylib
          
      - name: Upload Protected File
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed_Ghost_v3_PRO
          path: Tweak.dylib
