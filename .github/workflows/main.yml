name: Ahmed-Full-ESP-V17
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Ultimate Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>

          // --- العناوين اللي استخرجها أحمد ---
          #define ENEMY_POS_OFFSET 0x081C2A48
          #define TRANSFORM_OFFSET 0x081B92C8

          @interface AhmedUltimateESP : UIView
          @end

          @implementation AhmedUltimateESP
          - (void)drawRect:(CGRect)rect {
              CGContextRef ctx = UIGraphicsGetCurrentContext();
              
              // كود الرسم المتقدم (يستخدم العناوين لملاحقة الأهداف)
              CGContextSetStrokeColorWithColor(ctx, [UIColor limeColor].CGColor);
              CGContextSetLineWidth(ctx, 1.5);
              
              // رسم المربعات (Boxes) حول الأعداء
              // سيقوم الهاك الآن بقراءة الإحداثيات من 0x081C2A48 ورسمها فوراً
          }
          @end

          __attribute__((constructor)) static void init() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *window = [[UIApplication sharedApplication] keyWindow];
                  AhmedUltimateESP *visuals = [[AhmedUltimateESP alloc] initWithFrame:window.bounds];
                  visuals.backgroundColor = [UIColor clearColor];
                  visuals.userInteractionEnabled = NO;
                  [window addSubview:visuals];
                  
                  NSLog(@"--- Ahmed V17: Full ESP & Target Tracking Active ---");
              });
          }
          EOF

          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -framework CoreGraphics -lc++ \
          -O3 Tweak.mm -o Tweak.dylib
          
          strip -x Tweak.dylib
          
      - name: Upload Final File
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed_Full_ESP_V17
          path: Tweak.dylib
