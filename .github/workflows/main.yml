name: Build Modded IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          
      - name: Prepare Azule
        run: |
          git clone https://github.com/Al4ise/Azule
          sudo ln -s $(pwd)/Azule/azule /usr/local/bin/azule

      - name: Download IPA
        run: |
          # سيقوم هذا الأمر بالبحث عن ملف الـ IPA في آخر Release وتحميله
          curl -L -o WorldWarHeroes.ipa $(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | grep "browser_download_url" | cut -d '"' -f 4 | grep ".ipa")

      - name: Inject and Build
        run: |
          azule -i "WorldWarHeroes.ipa" -f "Tweak.xm" -o "WWH_MOD.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Modded-IPA
          path: WWH_MOD.ipa
