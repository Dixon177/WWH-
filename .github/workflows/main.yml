name: Ahmed-Legit-Pro-v6
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Balanced ESP Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <CoreGraphics/CoreGraphics.h>

          // --- إعدادات أحمد الموزونة (Legit) ---
          #define RECOIL_CONTROL 0.25f      // ارتداد بنسبة 25% (ثبات عالي لكن واقعي)
          #define HEADSHOT_CHANCE 1.35f     // نسبة هيدشوت متوسطة (ليست 100%)
          #define SPREAD_REDUCTION 0.40f    // تقليل انتشار الطلق بشكل متوازن

          // هيكل الـ ESP (المربعات والخطوط)
          @interface AhmedVisuals : UIView
          @end

          @implementation AhmedVisuals
          - (void)drawRect:(CGRect)rect {
              CGContextRef ctx = UIGraphicsGetCurrentContext();
              // رسم المربع (Box) حول اللاعب
              CGContextSetStrokeColorWithColor(ctx, [UIColor greenColor].CGColor); 
              CGContextStrokeRectWithWidth(ctx, CGRectMake(rect.origin.x, rect.origin.y, 50, 100), 1.0);
              
              // رسم الخط من الأعلى (Snapline)
              CGContextMoveToPoint(ctx, rect.size.width / 2, 0);
              CGContextAddLineToPoint(ctx, rect.origin.x + 25, rect.origin.y);
              CGContextStrokePath(ctx);
          }
          @end

          __attribute__((constructor)) static void init() {
              // تأخير بسيط لضمان استقرار الحقن
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(6 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  NSLog(@"--- Ahmed Legit Mod [25%% Recoil + Medium Headshot] Activated ---");
              });
          }
          EOF

          # الترجمة مع مكتبات الرسم الأساسية
          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -framework CoreGraphics -lc++ \
          -O2 Tweak.mm -o Tweak.dylib
          
          strip -x Tweak.dylib
          
      - name: Upload Legit File
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed_Legit_v6
          path: Tweak.dylib
