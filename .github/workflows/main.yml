name: Build Modded IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          
      - name: Prepare Azule
        run: |
          git clone https://github.com/Al4ise/Azule
          sudo ln -s $(pwd)/Azule/azule /usr/local/bin/azule

      - name: Download IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # سيقوم بتحميل أي ملف ينتهي بـ ipa من الريليس v1.0
          gh release download v1.0 --pattern "*.ipa" --repo ${{ github.repository }}
          # التأكد من تسمية الملف المحمل بالاسم المطلوب للحقن
          mv *.ipa WorldWarHeroes.ipa

      - name: Inject and Build
        run: |
          if [ -f "WorldWarHeroes.ipa" ]; then
            azule -i "WorldWarHeroes.ipa" -f "Tweak.xm" -o "WWH_MOD.ipa"
          else
            echo "Error: IPA file not found!"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Modded-IPA
          path: WWH_MOD.ipa
