name: Super-Fast Dylib Generator
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile Tweak to Dylib (No Theos Needed)
        run: |
          # سنستخدم مترجم Xcode المدمج في السيرفر مباشرة
          echo "Building Dylib..."
          # تحويل الكود لملف تشغيلي لآيفون
          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -lc++ \
          Tweak.xm -o Tweak.dylib || echo "Compilation started"
          
      - name: Upload Final File for ESign
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Ready-For-ESign
          path: Tweak.dylib
