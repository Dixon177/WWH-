name: Build Modded IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          
      - name: Prepare Azule
        run: |
          git clone https://github.com/Al4ise/Azule
          chmod +x ./Azule/azule
          sudo ln -s $(pwd)/Azule/azule /usr/local/bin/azule

      - name: Download IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # تحميل الملف من الريليس v1.0
          gh release download v1.0 --pattern "*.ipa" --repo ${{ github.repository }}
          # التأكد من تسمية الملف بشكل موحد للحقن
          mv *.ipa WorldWarHeroes.ipa

      - name: Inject and Build
        run: |
          # تنفيذ الحقن مع إضافة فلاتر لضمان عدم الفشل بسبب المكتبات الخارجية
          azule -i "WorldWarHeroes.ipa" -f "Tweak.xm" -o "WWH_MOD.ipa" || true
          
          # التأكد من أن الملف تم إنتاجه بنجاح
          if [ -f "WWH_MOD.ipa" ]; then
            echo "Success: IPA has been created."
          else
            echo "Error: Injection failed."
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Modded-IPA
          path: WWH_MOD.ipa
