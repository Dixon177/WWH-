name: Generate Dylib for ESign
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Theos (Compiler)
        run: |
          # تجهيز أدوات المطورين بسرعة لترجمة الكود
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks
          
      - name: Compile Tweak.xm to Dylib
        run: |
          # تحويل الكود النصي إلى ملف dylib حقيقي واحترافي
          export THEOS=~/theos
          $THEOS/bin/logos.pl Tweak.xm > Tweak.mm
          clang -dynamiclib -arch arm64 -isysroot ~/theos/sdks/iPhoneOS14.5.sdk -F ~/theos/vendor/lib -framework Foundation -framework UIKit -lc++ Tweak.mm -o Tweak.dylib || echo "Error in Code"
          
      - name: Upload Dylib for Ahmed
        uses: actions/upload-artifact@v4
        with:
          name: Final-Tweak-File
          path: Tweak.dylib
