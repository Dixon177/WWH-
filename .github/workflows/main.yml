name: Build Modded IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Azule
        run: |
          git clone https://github.com/Al4ise/Azule
          chmod +x ./Azule/azule
          sudo ln -s $(pwd)/Azule/azule /usr/local/bin/azule

      - name: Download IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v1.0 --pattern "*.ipa" --repo ${{ github.repository }}
          mv *.ipa WorldWarHeroes.ipa

      - name: Manual Injection
        run: |
          # سنحاول الحقن بصيغة ملفات الـ dylib إذا كان كودك نصياً بسيطاً
          # أو سنقوم بتجهيز الملف للرفع اليدوي
          mkdir -p out
          azule -i "WorldWarHeroes.ipa" -f "Tweak.xm" -o out/ -v || true
          
          # إذا فشلت الأداة في إنتاج IPA، سنقوم بضغط ملفات الهاك مع اللعبة يدوياً كـ Artifact
          if [ ! -f out/*.ipa ]; then
            echo "نظام الدمج الآلي فشل، سنقوم برفع الملفات الأصلية لدمجها يدوياً"
            zip -r Fix_Package.zip WorldWarHeroes.ipa Tweak.xm
          else
            mv out/*.ipa WorldWarHeroes_Modded.ipa
          fi

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Modded-Project
          path: |
            WorldWarHeroes_Modded.ipa
            Fix_Package.zip
