name: Build Modded IPA
on: [push, workflow_dispatch]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          
      - name: Prepare Azule
        run: |
          git clone https://github.com/Al4ise/Azule
          sudo ln -s $(pwd)/Azule/azule /usr/local/bin/azule

      - name: Download IPA from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # هذه الطريقة تستخدم أداة GitHub الرسمية للتحميل وهي الأضمن
          gh release download v1.0 -p "WorldWarHeroes.ipa" --repo ${{ github.repository }}

      - name: Inject and Build
        run: |
          if [ -f "WorldWarHeroes.ipa" ]; then
            azule -i "WorldWarHeroes.ipa" -f "Tweak.xm" -o "WWH_MOD.ipa"
          else
            echo "الملف غير موجود، تأكد من رفعه في الريليس v1.0"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Modded-IPA
          path: WWH_MOD.ipa
