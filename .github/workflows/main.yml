name: Ultimate Dylib Creator
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create & Compile C++ Tweak
        run: |
          # سنكتب كود سي بلس بلس مباشر يفهمه السيرفر فوراً
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #include <substrate.h>

          // هنا نضع كود الحماية والهاك اللي اتفقنا عليه
          __attribute__((constructor)) static void init() {
              NSLog(@"Ahmed's Hack Loaded Successfully!");
          }
          EOF

          # عملية الترجمة الاحترافية
          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -lc++ \
          Tweak.mm -o Tweak.dylib
          
      - name: Upload Dylib to Ahmed
        uses: actions/upload-artifact@v4
        with:
          name: Final_Tweak_Ready
          path: Tweak.dylib
