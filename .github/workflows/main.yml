name: Ultimate Dylib Creator
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create & Compile Clean Tweak
        run: |
          # كود نقي 100% بدون حاجة لمكتبات خارجية
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>

          // رسالة ترحيب تظهر في سجلات النظام عند تشغيل اللعبة
          __attribute__((constructor)) static void init() {
              NSLog(@"--- Ahmed Hack Loaded Successfully ---");
          }
          EOF

          # ترجمة الكود باستخدام مكتبات النظام فقط
          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -lc++ \
          Tweak.mm -o Tweak.dylib
          
      - name: Upload Dylib to Ahmed
        uses: actions/upload-artifact@v4
        with:
          name: Tweak_Final_Ahmed
          path: Tweak.dylib
