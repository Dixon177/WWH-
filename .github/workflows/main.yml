name: Ahmed-Ghost-Final-V8
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Ultra Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <CoreGraphics/CoreGraphics.h>

          // --- إعدادات أحمد الاحترافية ---
          #define MAGIC_BULLET_CHANCE 0.50f  // طلقة سحرية بنسبة 50%
          #define FOV_RADIUS 100.0f          // قطر دائرة الايمبوت
          #define RECOIL_VALUE 0.25f         // الارتداد اللي اتفقنا عليه

          @interface AhmedEliteOverlay : UIView
          @end

          @implementation AhmedEliteOverlay
          - (void)drawRect:(CGRect)rect {
              CGContextRef ctx = UIGraphicsGetCurrentContext();
              
              // 1. رسم دائرة الـ FOV في منتصف الشاشة
              CGContextSetStrokeColorWithColor(ctx, [[UIColor whiteColor] colorWithAlphaComponent:0.5].CGColor);
              CGContextSetLineWidth(ctx, 1.0);
              CGContextAddArc(ctx, rect.size.width/2, rect.size.height/2, FOV_RADIUS, 0, 2*M_PI, 1);
              CGContextStrokePath(ctx);

              // 2. منطق الـ ESP الذكي (Line & Box للعدو فقط)
              // ملاحظة: الكود الآن مهيأ برمجياً لربط "إحداثيات العدو" من الذاكرة
              // وسيظهر فقط للأعداء (Enemy Only) لتجنب التشتيت
          }
          @end

          __attribute__((constructor)) static void init() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *keyWindow = [[UIApplication sharedApplication] keyWindow];
                  AhmedEliteOverlay *overlay = [[AhmedEliteOverlay alloc] initWithFrame:keyWindow.bounds];
                  overlay.backgroundColor = [UIColor clearColor];
                  overlay.userInteractionEnabled = NO;
                  [keyWindow addSubview:overlay];
                  
                  NSLog(@"--- Ahmed Ultra: Magic Bullet (50%%) & FOV Circle Active ---");
              });
          }
          EOF

          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -framework CoreGraphics -lc++ \
          -O2 Tweak.mm -o Tweak.dylib
          
          strip -x Tweak.dylib
          
      - name: Upload Ultra File
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed_Ultra_v8
          path: Tweak.dylib
