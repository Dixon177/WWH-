name: Build Modded IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Azule & Dependencies
        run: |
          git clone https://github.com/Al4ise/Azule
          chmod +x ./Azule/azule
          sudo ln -s $(pwd)/Azule/azule /usr/local/bin/azule
          mkdir -p ~/.azule/lib
          mkdir -p out
          curl -L "https://github.com/Al4ise/Azule/raw/master/bin/CydiaSubstrate.framework.zip" -o ~/.azule/lib/CydiaSubstrate.framework.zip
          curl -L "https://github.com/Al4ise/Azule/raw/master/bin/Substitute.zip" -o ~/.azule/lib/Substitute.zip

      - name: Compile Tweak to Dylib
        run: |
          # ترجمة كود التويك إلى ملف dylib لكي تفهمه أداة Azule بسهولة
          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -install_name @executable_path/Tweak.dylib Tweak.xm -o Tweak.dylib || echo "Compilation failed, but we will try to proceed"

      - name: Download IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v1.0 --pattern "*.ipa" --repo ${{ github.repository }}
          mv *.ipa WorldWarHeroes.ipa

      - name: Inject and Build
        run: |
          # الحقن باستخدام ملف الـ dylib الذي أنتجناه
          if [ -f "Tweak.dylib" ]; then
            azule -i "WorldWarHeroes.ipa" -f "Tweak.dylib" -o out/
          else
            # إذا فشلت الترجمة، سنحاول بالملف العادي مع أمر إضافي
            azule -i "WorldWarHeroes.ipa" -f "Tweak.xm" -o out/
          fi
          
          if ls out/*.ipa 1> /dev/null 2>&1; then
            mv out/*.ipa WorldWarHeroes_Modded.ipa
          else
            echo "Error: Final build failed"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Modded-IPA
          path: WorldWarHeroes_Modded.ipa
