name: Ahmed-Ultimate-Fix-V18
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Fixed Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>

          // العناوين اللي استخرجتها أنت من الـ Hex
          #define ENEMY_POS_OFFSET 0x081C2A48
          #define TRANSFORM_OFFSET 0x081B92C8

          @interface AhmedFixedESP : UIView
          @end

          @implementation AhmedFixedESP
          - (void)drawRect:(CGRect)rect {
              CGContextRef ctx = UIGraphicsGetCurrentContext();
              
              // تم إصلاح اللون هنا إلى الأخضر القياسي لتجنب الخطأ
              CGContextSetStrokeColorWithColor(ctx, [UIColor greenColor].CGColor);
              CGContextSetLineWidth(ctx, 2.0);
              
              // رسم المربع في المنتصف كاختبار أولي لربط العناوين
              CGRect testBox = CGRectMake(rect.size.width/2 - 50, rect.size.height/2 - 50, 100, 100);
              CGContextStrokeRect(ctx, testBox);
          }
          @end

          __attribute__((constructor)) static void init() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  // تم تحديث طريقة جلب النافذة لتناسب iOS 13 فما فوق
                  UIWindow *window = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* windowScene in [UIApplication sharedApplication].connectedScenes) {
                          if (windowScene.activationState == UISceneActivationStateForegroundActive) {
                              window = windowScene.windows.firstObject;
                              break;
                          }
                      }
                  } else {
                      window = [UIApplication sharedApplication].keyWindow;
                  }
                  
                  if (window) {
                      AhmedFixedESP *visuals = [[AhmedFixedESP alloc] initWithFrame:window.bounds];
                      visuals.backgroundColor = [UIColor clearColor];
                      visuals.userInteractionEnabled = NO;
                      [window addSubview:visuals];
                  }
              });
          }
          EOF

          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -framework CoreGraphics -lc++ \
          -O3 Tweak.mm -o Tweak.dylib
          
          strip -x Tweak.dylib
          
      - name: Upload Fixed Tweak
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed_Ultimate_V18
          path: Tweak.dylib
