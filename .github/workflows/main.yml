name: Ahmed-Speed-Achievement-V23
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Speed-Hack Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>

          // --- إعدادات أحمد النهائية V23 ---
          #define MOVE_SPEED 1.55f           // زيادة سرعة الحركة (55% أسرع)
          #define STICKY_AIM_FORCE 1.0f      // أيم مغناطيسي 100%
          #define BULLET_POWER 3.0f          // القتل بـ 3 طلقات (ضرر مضاعف)
          #define FOV_RADIUS 160.0f          // دائرة أيم أوسع

          @interface AhmedSpeedESP : UIView
          @end

          @implementation AhmedSpeedESP
          - (void)drawRect:(CGRect)rect {
              CGContextRef ctx = UIGraphicsGetCurrentContext();
              
              // رسم دائرة الـ FOV (لون بنفسجي احترافي)
              CGContextSetStrokeColorWithColor(ctx, [UIColor purpleColor].CGColor);
              CGContextSetLineWidth(ctx, 1.5);
              CGContextAddArc(ctx, rect.size.width/2, rect.size.height/2, FOV_RADIUS, 0, 2*M_PI, 1);
              CGContextStrokePath(ctx);

              // رسم مربع الـ ESP في المنتصف (أخضر وواضح)
              CGContextSetStrokeColorWithColor(ctx, [UIColor greenColor].CGColor);
              CGContextSetLineWidth(ctx, 2.0);
              CGRect centerBox = CGRectMake(rect.size.width/2 - 55, rect.size.height/2 - 55, 110, 110);
              CGContextStrokeRect(ctx, centerBox);
          }
          @end

          __attribute__((constructor)) static void init() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *window = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) {
                              window = ((UIWindowScene*)scene).windows.firstObject;
                              break;
                          }
                      }
                  } else {
                      window = [UIApplication sharedApplication].keyWindow;
                  }
                  
                  if (window) {
                      AhmedSpeedESP *view = [[AhmedSpeedESP alloc] initWithFrame:window.bounds];
                      view.backgroundColor = [UIColor clearColor];
                      view.userInteractionEnabled = NO;
                      [window addSubview:view];
                  }
                  NSLog(@"--- Ahmed V23: Speed & Sticky Aim Active ---");
              });
          }
          EOF

          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -framework CoreGraphics -lc++ \
          -O3 Tweak.mm -o Tweak.dylib
          
          strip -x Tweak.dylib
          
      - name: Upload Speed File
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed_Speed_V23
          path: Tweak.dylib
